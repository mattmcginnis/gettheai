name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: getthe
          POSTGRES_PASSWORD: getthe
          POSTGRES_DB: getthe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U getthe -d getthe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.11
        env:
          MEILI_MASTER_KEY: getthe_dev_master_key
          MEILI_NO_ANALYTICS: "true"
        ports:
          - 7700:7700
    env:
      DATABASE_URL: postgresql://getthe:getthe@127.0.0.1:5432/getthe
      MEILISEARCH_HOST: http://127.0.0.1:7700
      MEILISEARCH_API_KEY: getthe_dev_master_key
      SEARCH_INDEX_NAME: domain_listings
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      ALLOW_LOCAL_AUTH_FALLBACK: "true"
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: curl --retry 30 --retry-all-errors --retry-delay 2 http://127.0.0.1:7700/health
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy
      - run: npm run prisma:seed
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run db:smoke
      - run: npm run db:cleanup
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium
      - run: npm run db:cleanup
