name: Staging Deploy

on:
  workflow_dispatch:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
      REQUIRE_PRODUCTION_SECRETS: "true"
      NEXT_PUBLIC_APP_URL: ${{ secrets.STAGING_APP_URL }}
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.STAGING_CLERK_SECRET_KEY }}
      CLERK_WEBHOOK_SECRET: ${{ secrets.STAGING_CLERK_WEBHOOK_SECRET }}
      ESCROW_API_BASE_URL: ${{ secrets.STAGING_ESCROW_API_BASE_URL }}
      ESCROW_API_EMAIL: ${{ secrets.STAGING_ESCROW_API_EMAIL }}
      ESCROW_API_KEY: ${{ secrets.STAGING_ESCROW_API_KEY }}
      ESCROW_MODE: ${{ secrets.STAGING_ESCROW_MODE }}
      ESCROW_WEBHOOK_SECRET: ${{ secrets.STAGING_ESCROW_WEBHOOK_SECRET }}
      POSTMARK_SERVER_TOKEN: ${{ secrets.STAGING_POSTMARK_SERVER_TOKEN }}
      POSTMARK_FROM_EMAIL: ${{ secrets.STAGING_POSTMARK_FROM_EMAIL }}
      MEILISEARCH_HOST: ${{ secrets.STAGING_MEILISEARCH_HOST }}
      MEILISEARCH_API_KEY: ${{ secrets.STAGING_MEILISEARCH_API_KEY }}
      SEARCH_INDEX_NAME: domain_listings
      S3_BUCKET: ${{ secrets.STAGING_S3_BUCKET }}
      S3_REGION: ${{ secrets.STAGING_S3_REGION }}
      S3_ACCESS_KEY_ID: ${{ secrets.STAGING_S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.STAGING_S3_SECRET_ACCESS_KEY }}
      S3_ENDPOINT: ${{ secrets.STAGING_S3_ENDPOINT }}
      S3_PUBLIC_BASE_URL: ${{ secrets.STAGING_S3_PUBLIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run preview:verify-env
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}
      - run: npx vercel build --token=${{ env.VERCEL_TOKEN }}
      - run: npx vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }}
